<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Efemérides - Estación Zúñiga</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; padding: 20px; text-align: center; }
        .card { background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 20px; max-width: 500px; margin: auto; }
        h1 { color: #0056b3; font-size: 1.5rem; }
        .fecha { font-weight: bold; color: #666; margin-bottom: 20px; }
        .seccion { text-align: left; margin-bottom: 15px; border-left: 5px solid #0056b3; padding-left: 10px; }
        .tipo { font-size: 0.8rem; text-transform: uppercase; color: #0056b3; font-weight: bold; }
        .cerrar { margin-top: 20px; display: inline-block; padding: 10px 20px; background: #e63946; color: white; border-radius: 5px; text-decoration: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <h1>📜 Efemérides del Día</h1>
        <div id="fecha-actual" class="fecha"></div>

        <div id="contenido-efemerides">
            <!-- Aquí el script cargará la información -->
        </div>

        <div class="cerrar" onclick="window.close()">Cerrar Ventana</div>
    </div>

    <script>
        const hoy = new Date();
        const opciones = { day: 'numeric', month: 'long' };
        document.getElementById('fecha-actual').innerText = hoy.toLocaleDateString('es-AR', opciones);

        // Simulación de base de datos para hoy 2 de mayo
        const datos = [
            { tipo: "Mundial", evento: "Día Internacional contra el Bullying o Acoso Escolar." },
            { tipo: "Nacional", evento: "Aniversario del hundimiento del Crucero General Belgrano durante la Guerra de Malvinas (1982)." },
            { tipo: "Cultura", evento: "Se celebra el Día Mundial del Atún (conciencia sobre la pesca sostenible)." }
        ];

        let html = "";
        datos.forEach(item => {
            html += `<div class="seccion">
                        <span class="tipo">${item.tipo}</span>
                        <p>${item.evento}</p>
                     </div>`;
        });

        document.getElementById('contenido-efemerides').innerHTML = html;
    </script>
</body>
</html>
